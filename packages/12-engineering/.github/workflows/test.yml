name: test

on:
  push: { branches: [main] }
  pull_request: {}

jobs:
  unit:
    name: 单元 + 集成测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 安装依赖(锁版本)
        run: pnpm install --frozen-lockfile

      - name: 跑所有非 e2e 包
        run: pnpm -r --filter "!@testing-lab/11-e2e-playwright" test

      - name: 覆盖率
        run: pnpm --filter @testing-lab/10-coverage test:coverage

      - name: 上传覆盖率 artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: packages/10-coverage/coverage/

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: 装 playwright 浏览器(带系统依赖)
        run: pnpm --filter @testing-lab/11-e2e-playwright exec playwright install --with-deps

      - name: 跑 e2e
        run: pnpm --filter @testing-lab/11-e2e-playwright test:e2e

      - name: 失败时上传 trace + 截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/11-e2e-playwright/playwright-report/
